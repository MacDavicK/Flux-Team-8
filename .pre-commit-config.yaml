repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.3.15
    hooks:
      - id: biome-check
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|jsonc)$
        additional_dependencies: ["@biomejs/biome@2.3.15"]
        entry: bash -c 'cd frontend && biome check --write ${@#frontend/}' --

  - repo: local
    hooks:
      - id: tsc
        name: TypeScript type check (frontend)
        language: system
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        files: ^frontend/
        pass_filenames: false
